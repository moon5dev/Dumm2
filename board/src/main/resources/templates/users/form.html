<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-4">
        <div class="mb-3">
            <h4 th:text="${mode == 'create'} ? 'Create User' : 'Edit User'">User Form</h4>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger">
            <span th:text="${errorMessage}"></span>
        </div>

        <form class="mb-4" th:action="${mode == 'create'} ? @{/admin/users} : @{/admin/users/{id}(id=${user.id})}" method="post">
            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">Username</label>
                <div class="col-sm-10">
                    <input type="text"
                           class="form-control"
                           name="username"
                           th:if="${mode == 'create'}"
                           th:value="${form != null ? form.username : ''}">
                    <input type="text"
                           class="form-control"
                           disabled
                           name="username"
                           th:if="${mode == 'edit'}"
                           th:value="${user.username}">
                </div>
            </div>

            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">Name</label>
                <div class="col-sm-10">
                    <input type="text"
                           class="form-control"
                           name="name"
                           th:value="${mode == 'edit' ? user.name : (form != null ? form.name : '')}">
                </div>
            </div>

            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">Password</label>
                <div class="col-sm-10">
                    <input type="password"
                           class="form-control"
                           name="password"
                           placeholder="Enter new password">
                </div>
            </div>

            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">Role</label>
                <div class="col-sm-10">
                    <select class="form-select" name="role">
                        <option value="ADMIN" th:selected="${form != null ? form.role == 'ADMIN' : (user != null ? user.role == 'ADMIN' : false)}">ADMIN</option>
                        <option value="USER" th:selected="${form != null ? form.role == 'USER' : (user != null ? user.role == 'USER' : false)}">USER</option>
                    </select>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" th:text="${mode == 'create'} ? 'Save' : 'Update'">Save</button>
            </div>
        </form>
    </div>
</body>
</html>
